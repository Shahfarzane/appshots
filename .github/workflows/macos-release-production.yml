name: macOS Release - Production

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: macos-release-production
  cancel-in-progress: false

jobs:
  release:
    name: Build, Sign, Notarize, Release
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      DEVELOPER_ID_KEYCHAIN_GZIP_BASE64: ${{ secrets.DEVELOPER_ID_KEYCHAIN_GZIP_BASE64 }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      GH_TOKEN: ${{ github.token }}
      NSUnbufferedIO: "YES"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup build
        run: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Restore signing material
        run: |
          set -euo pipefail
          test -n "$DEVELOPER_ID_KEYCHAIN_GZIP_BASE64"
          test -n "$KEYCHAIN_PASSWORD"
          test -n "$SPARKLE_PRIVATE_KEY"
          mkdir -p Distribution/Keychain/SparkleKeys
          printf "%s" "$DEVELOPER_ID_KEYCHAIN_GZIP_BASE64" | base64 --decode | gunzip > Distribution/Keychain/Developer-ID-Keychain.keychain
          printf "%s" "$SPARKLE_PRIVATE_KEY" > Distribution/Keychain/SparkleKeys/private-key.txt
          chmod 600 Distribution/Keychain/Developer-ID-Keychain.keychain
          chmod 600 Distribution/Keychain/SparkleKeys/private-key.txt

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build, sign, notarize, package
        id: build
        timeout-minutes: 45
        run: Distribution/Scripts/release.sh build

      - name: Compose release notes
        id: notes
        run: |
          set -euo pipefail
          tag='${{ steps.build.outputs.tag }}'
          # GitHub's auto-generated "What's Changed", with the repo owner's own
          # @mention dropped (noise on a solo repo) while outside contributors
          # keep their "by @name" credit.
          changelog=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$tag" --jq .body \
            | sed "s/ by @${{ github.repository_owner }} in / in /g")
          {
            echo 'body<<__RELEASE_NOTES_EOF__'
            cat .github/RELEASE_NOTES.md
            echo
            printf '%s\n' "$changelog"
            echo '__RELEASE_NOTES_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.tag }}
          name: Release ${{ steps.build.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            artifacts/Appshots.dmg
            artifacts/appshotsctl-*-arm64.zip

      - name: Publish Sparkle appcast and immutable DMG to the release
        run: Distribution/Scripts/release.sh upload

      - name: Upload release debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-debug
          path: |
            xcodebuild.log
            .build/Appshots.dmg
            .build/Appshots.xcarchive
          if-no-files-found: ignore
